      .reveal-wrapper {

          opacity: 0 !important;

      /* LEFT: sticky panel — vertically centered in viewport */
      .grid-work .sticky-lft {
          width: 28% !important;
          min-width: 220px !important;
          flex-shrink: 0 !important;
          position: sticky !important;
          top: 0 !important;
          height: 100vh !important;
          display: block !important; /* Use block to allow absolute positioning of children */
          z-index: 2 !important;
      }

      /* RIGHT: scrolling image column */
      .grid-work .work-main {
          flex: 1 1 0% !important;
          width: 0 !important; /* forces flex to control width */
          min-width: 0 !important;
          display: flex !important;
          flex-direction: column !important;
          padding-top: 5rem !important;
          padding-bottom: 5rem !important;
          padding-left: 5% !important;
          box-sizing: border-box !important;

      /* Stack work cards vertically */
      .work-main .wrok-wrapper,

          display: flex !important;

      /* Each card fills the column */

          width: 100% !important;
          max-width: 100% !important;
          margin: 0 !important;
      }

      /* Image wrappers fill their card */
      .work-card .image-wrap,
      .work-card .image-wrap.full-width {
          width: 100% !important;
          max-width: 100% !important;
      }

      /* Images fill their wrappers */
      .work-card .paralax-image {
          width: 100% !important;
          max-width: 100% !important;
          height: auto !important;
          display: block !important;
          object-fit: cover !important;
      }

      /* work-main-wrapper fills its card */
      .work-card .work-main-wrapper {
          width: 100% !important;
          display: block !important;
      }

      /* collection wrappers fill width */
      .work-card .collection-list-wrapper,
      .work-card .collection-list-full,
      .work-card .collection-full {
          width: 100% !important;
      }

      /* Position the Work text at the top */
      .grid-work .sticky-lft > div:first-child {
          position: absolute !important;

          left: 0 !important;
          margin: 0 !important;

      /* Position the dot near the middle */

                                            entry.target.querySelectorAll('.reveal-text').forEach(el => el.classList.remove('in-view'));
                                        }
                                    });
                                }, { threshold: 0.1 });
                                observer.observe(h2Title);
                            }

                            // Restart Webflow so animations work on the new element
                            if (window.Webflow) {
                                window.Webflow.destroy();
                                window.Webflow.ready();
                                if (window.Webflow.require('ix2')) {
                                    window.Webflow.require('ix2').init();
                                }
                            }
                        }
                    }
                }, 1500);
                // ------------------------

                
                // Re-execute scripts
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = window.pageBodyContent;
                tempDiv.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    if (!oldScript.src) newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    document.body.appendChild(newScript);
                });

                window.dispatchEvent(new Event('DOMContentLoaded'));
                window.dispatchEvent(new Event('load'));
            }
        })();
    </script>
