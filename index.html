</head>
<body>
    <div id="main">
        <!-- Content will be loaded here -->
    </div>

    
    

    <script src="head.js"></script>
    <script src="body.js"></script>
    <script>
        (function() {
            // Inject head content
            if (window.pageHeadContent) {
                const headTemp = document.createElement('div');
                headTemp.innerHTML = window.pageHeadContent;
                Array.from(headTemp.childNodes).forEach(node => {
                    if (node.nodeName === 'STYLE' || node.nodeName === 'LINK' || node.nodeName === 'META') {
                        document.head.appendChild(node);
                    }
                });
            }

            // Inject body content
            if (window.pageBodyContent) {
                const main = document.getElementById('main');
                if (main) main.outerHTML = window.pageBodyContent;
                
                // Re-execute scripts
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = window.pageBodyContent;
                tempDiv.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    if (!oldScript.src) newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    document.body.appendChild(newScript);
                });

                window.dispatchEvent(new Event('DOMContentLoaded'));
                window.dispatchEvent(new Event('load'));
            }
        })();
    </script>
</body>
</html>
