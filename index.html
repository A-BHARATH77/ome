    <!-- Custom Layout Overrides -->
    <style>
      /* ===== GRID-WORK SECTION ===== */

      /* Outer wrapper: full width, horizontal split */
      .grid-work {
          display: flex !important;
          flex-direction: row !important;
          align-items: flex-start !important;
          width: 100% !important;
          max-width: 100% !important;
          padding: 0 6% !important;
          box-sizing: border-box !important;
          min-height: 100vh !important;
          position: relative !important;
          background-color: #f7f2e6 !important;
          margin-top: -3rem !important;
      }

      /* Text colors for grid-work */
      .grid-work .top-text:not(.for-b),
      .grid-work .h2,
      .grid-work .small-ftd,
      .grid-work .work-title {
          color: #576E47 !important;
      }

      /* Progressive Reveal Animation */
      .reveal-wrapper {
          display: inline-block;
          overflow: hidden;
          vertical-align: top;
          padding-bottom: 0.15em;
          margin-bottom: -0.15em;
      }
      .reveal-text {
          display: inline-block;
          transform: translateY(110%);
          opacity: 0;
          transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease-out;
      }
      .reveal-text.in-view {
          transform: translateY(0);
          opacity: 1;
      }

      /* Hide Webflow badge */
      .w-webflow-badge {
          display: none !important;
          visibility: hidden !important;
          opacity: 0 !important;
          pointer-events: none !important;
      }

      /* LEFT: sticky panel — vertically centered in viewport */
      .grid-work .sticky-lft {
          width: 28% !important;
          min-width: 220px !important;
          flex-shrink: 0 !important;
          position: sticky !important;
          top: 0 !important;
          height: 100vh !important;
          display: block !important; /* Use block to allow absolute positioning of children */
          z-index: 2 !important;
      }

      /* RIGHT: scrolling image column */
      .grid-work .work-main {
          flex: 1 1 0% !important;
          width: 0 !important; /* forces flex to control width */
          min-width: 0 !important;
          display: flex !important;
          flex-direction: column !important;
          padding-top: 5rem !important;
          padding-bottom: 5rem !important;
          padding-left: 5% !important;
          box-sizing: border-box !important;
      }

      /* Stack work cards vertically */
      .work-main .wrok-wrapper,
      .work-main .w-layout-grid {
          display: flex !important;
          flex-direction: column !important;
          gap: 3rem !important;
          width: 100% !important;
      }

      /* Each card fills the column */
      .work-card {
          width: 100% !important;
          max-width: 100% !important;
          margin: 0 !important;
      }

      /* Image wrappers fill their card */
      .work-card .image-wrap,
      .work-card .image-wrap.full-width {
          width: 100% !important;
          max-width: 100% !important;
      }

      /* Images fill their wrappers */
      .work-card .paralax-image {
          width: 100% !important;
          max-width: 100% !important;
          height: auto !important;
          display: block !important;
          object-fit: cover !important;
      }

      /* work-main-wrapper fills its card */
      .work-card .work-main-wrapper {
          width: 100% !important;
          display: block !important;
      }

      /* collection wrappers fill width */
      .work-card .collection-list-wrapper,
      .work-card .collection-list-full,
      .work-card .collection-full {
          width: 100% !important;
      }

      /* Position the Work text at the top */
      .grid-work .sticky-lft > div:first-child {
          position: absolute !important;
          top: 12% !important;
          left: 0 !important;
          margin: 0 !important;
      }

      /* Position the dot near the middle */
      .grid-work .sticky-lft .circle-divider {
          position: absolute !important;
          top: 42% !important;
          left: 0 !important;
          margin: 0 !important;
      }

      /* Position the "View all work" button further down */
      .grid-work .sticky-lft > div:last-child,
      .grid-work .sticky-lft [data-w-id] {
          position: absolute !important;
          top: 68% !important;
          left: 0 !important;
          margin: 0 !important;
      }

      /* Keep the button wrapper 100% width in case there's a border */
      .grid-work .sticky-lft > div:last-child {
          width: 100% !important;
      }

      /* Mobile */
      @media (max-width: 991px) {
          .grid-work {
              flex-direction: column !important;
              padding: 2rem 5% !important;
              min-height: unset !important;
          }
          .grid-work .sticky-lft {
              width: 100% !important;
              min-width: unset !important;
              position: relative !important;
              height: auto !important;
              top: auto !important;
              margin-bottom: 2.5rem !important;
          }
          /* Reset text position for mobile */
          .grid-work .sticky-lft > div:first-child {
              position: relative !important;
              top: auto !important;
              margin-bottom: 1.5rem !important;
          }
          .grid-work .work-main {
              width: 100% !important;
              flex: unset !important;
              padding-left: 0 !important;
          }
      }
    </style>

    @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&display=swap");

    :root {
      --bg: #f1efe7;

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: "PP Neue Montreal"; color: var(--fg); }

    h2 { font-size: 1.75rem; font-weight: 500; letter-spacing: -0.02rem; line-height: 1.1; }

      font-weight: 500; overflow: hidden; line-height: 1;

    #main { position: relative; z-index: 2; background-color: var(--bg); box-shadow: 0 -20px 50px rgba(0,0,0,0.1); }

      position: sticky; top: 0; z-index: 1;
      width: 100vw; height: 100svh;
      background-color: var(--bg); overflow: hidden;

      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: var(--loader-bg);
      transform-origin: bottom; transform: scaleY(100%);
    }

    .counter {
      position: fixed; right: 3rem; bottom: 2rem;
      display: flex; height: 120px; font-size: 120px; line-height: 150px;

<script>

    gsap.registerPlugin(Flip);


    const createCounterDigits = () => {
      const counter1 = document.querySelector(".counter-1");
      const num0 = document.createElement("div"); num0.className = "num"; num0.textContent = "0";
      counter1.appendChild(num0);
      const num1 = document.createElement("div"); num1.className = "num num1offset1"; num1.textContent = "1";
      counter1.appendChild(num1);

      const counter2 = document.querySelector(".counter-2");
      for (let i = 0; i <= 10; i++) {
        const numDiv = document.createElement("div");
        numDiv.className = i === 1 ? "num num1offset2" : "num";
        numDiv.textContent = i === 10 ? "0" : i;
        counter2.appendChild(numDiv);
      }

      const counter3 = document.querySelector(".counter-3");
      for (let i = 0; i < 30; i++) {
        const numDiv = document.createElement("div");
        numDiv.className = "num";
        numDiv.textContent = i % 10;
        counter3.appendChild(numDiv);
      }
      const finalNum = document.createElement("div"); finalNum.className = "num"; finalNum.textContent = "0";
      counter3.appendChild(finalNum);
    };

    const animateCounter = (counter, duration, delay = 0) => {
      const numHeight = counter.querySelector(".num").clientHeight;
      const totalDistance = (counter.querySelectorAll(".num").length - 1) * numHeight;
      gsap.to(counter, { y: -totalDistance, duration, delay, ease: "power2.inOut" });
    };

    function animateImages() {
      const images = document.querySelectorAll(".img");
      images.forEach(img => img.classList.remove("animate-out"));
      const state = Flip.getState(images);
      images.forEach(img => img.classList.add("animate-out"));

      const mainTimeline = gsap.timeline();

      mainTimeline.add(
        Flip.from(state, {
          duration: 1,
          stagger: 0.1,
          ease: "power3.inOut",
        })
      );

      images.forEach((img, index) => {
        const scaleTimeline = gsap.timeline();
        scaleTimeline
          .to(img, { scale: 2.5, duration: 0.45, ease: "power3.in" }, 0.025)
          .to(img, { scale: 1, duration: 0.45, ease: "power3.out" }, 0.5);
        mainTimeline.add(scaleTimeline, index * 0.1);
      });

      return mainTimeline;
    }

    (() => {
      // --- Initialize brand logo: centered in viewport ---
      const logo     = document.getElementById('brandLogo');
      const logoSize = Math.min(window.innerWidth * 0.13, 160);
      if (logo) {
        // Pure pixel placement at viewport center — no % units so GSAP tweens cleanly
        gsap.set(logo, {
          width: logoSize,
          top:   (window.innerHeight - logoSize) / 2,
          left:  (window.innerWidth  - logoSize) / 2,
        });
        gsap.to(logo, { opacity: 1, duration: 0.6, delay: 0.1 });
      }

      createCounterDigits();

      const tl = gsap.timeline();
      gsap.set(".img", { scale: 0 });

      // PHASE 1: counter (bg already covers screen from CSS)
      tl.add(() => {
        animateCounter(document.querySelector(".counter-3"), 2.5);
        animateCounter(document.querySelector(".counter-2"), 3);
        animateCounter(document.querySelector(".counter-1"), 2, 1.5);
      }, 0.25);

      // PHASE 2: images pop in (all at top-left, stacked — they animate as one unit)
      tl.to(".img", {
        scale: 1,
        duration: 1,
        stagger: 0.125,
        ease: "power3.out",
      }, "<");

      // PHASE 3: counter fades → Flip runs → then float up → shoot marquee left
      tl.to(".counter", {
        opacity: 0,
        duration: 0.3,
        ease: "power3.out",
        delay: 0.3,
        onStart: () => {
          const flipTl = animateImages();

          flipTl.eventCallback("onComplete", () => {

            // --- LOGO: fly from center to navbar ---
            const logo = document.getElementById('brandLogo');
            if (logo) {
              const navSize = 52;
              gsap.to(logo, {
                top:      18,
                left:     (window.innerWidth - navSize) / 2,
                width:    navSize,
                duration: 1.0,
                ease:     'power4.inOut',
                onComplete: () => {
                  gsap.set(logo, { zIndex: 9999 });
                  gsap.to(logo.querySelector('img'), {
                    rotation: 360,
                    duration: 7,
                    repeat: -1,
                    ease: 'none',
                    transformOrigin: '50% 50%',
                  });
                },
              });
            }

            // --- STEP A: float stacked block up to right-center ---
            const imgEl = document.querySelector(".img.animate-out");
            if (!imgEl) return;
            const rect   = imgEl.getBoundingClientRect();
            const deltaY = window.innerHeight / 2 - rect.height / 2 - rect.top;

            gsap.to(".img", {
              y: "+=" + deltaY,
              duration: 1.0,
              ease: "power4.inOut",
              onComplete: () => {

                // --- STEP B: deal img15 → img1 leftward from the stack ---
                const allImgs = Array.from(document.querySelectorAll(".img.animate-out"));
                const imgsRev = [...allImgs].reverse(); // [img15, img14, … img1]
                const imgW    = rect.width;
                const gap     = 12;
                const totalW  = imgsRev.length * (imgW + gap);

                // img15 (i=0) flies farthest left; img1 (i=14) stays at stack
                const dealXs = imgsRev.map((_, i) => -(imgsRev.length - 1 - i) * (imgW + gap));

                const currentXs  = [...dealXs];
                const stackLeft  = window.innerWidth - 24 - imgW;

                const dealTl = gsap.timeline({
                  onComplete: () => {
                    // Enable scroll now that marquee is ready
                    document.body.classList.remove("no-scroll");
                    
                    const speed = 1.4;
                    function loop() {
                      for (let i = 0; i < imgsRev.length; i++) {
                        currentXs[i] -= speed;
                        if (stackLeft + currentXs[i] + imgW < 0) currentXs[i] += totalW;
                        gsap.set(imgsRev[i], { x: currentXs[i] });
                      }
                      requestAnimationFrame(loop);
                    }
                    requestAnimationFrame(loop);
                  }
                });

                // Stagger: img15 shoots first, img1 last — same rhythm as Flip
                imgsRev.forEach((img, i) => {
                  const imgTl = gsap.timeline();
                  imgTl
                    .to(img, { scale: 0.75, duration: 0.3, ease: "power3.in" }, 0)
                    .to(img, { scale: 1,    duration: 0.7, ease: "power3.out" }, 0.3)
                    .to(img, { x: dealXs[i], duration: 1.0, ease: "power3.inOut" }, 0);
                  dealTl.add(imgTl, i * 0.065);
                });




                // Fade in headline, tag, para at staggered times
                gsap.to(".hero-big-text", {
                  opacity: 1,
                  duration: 1.2,
                  ease: "power3.out",
                  delay: 0.2,
                });
                gsap.to(".hero-tag", {
                  opacity: 1,
                  duration: 0.9,
                  ease: "power3.out",
                  delay: imgsRev.length * 0.1 * 0.5,
                });
                gsap.to(".hero-para", {
                  opacity: 1,
                  duration: 1.0,
                  ease: "power3.out",
                  delay: imgsRev.length * 0.1 * 0.6,
                });
              },
            });
          });
        },
      });

    })();

  </script>

<!-- Hide our custom hero when Framer routes away from home -->
<script>
  (function() {
    var hero  = document.querySelector('section.hero');
    var logo  = document.getElementById('brandLogo');

    function isHome() {
      var p = window.location.pathname;
      // home = ends in / or /index.html or is just the file root
      return p === '/' || p.endsWith('/') || p.endsWith('/index.html') || p === '';
    }

    function applyVisibility() {
      var home = isHome();
      if (hero) hero.style.display = home ? '' : 'none';
      if (logo) logo.style.display = home ? '' : 'none';
    }

    // Patch pushState / replaceState so we catch Framer's router
    var _push = history.pushState;
    history.pushState = function() { _push.apply(this, arguments); applyVisibility(); };
    var _replace = history.replaceState;
    history.replaceState = function() { _replace.apply(this, arguments); applyVisibility(); };
    window.addEventListener('popstate', applyVisibility);

    // Run once on load in case we land on a non-home route
    applyVisibility();
  })();
</script>
<!-- Page transition curtain (brand green wipe covers exit, slides off on enter) -->

<!-- Intercept Framer's ./about SPA link → hard-navigate with transition -->
<script>
  document.addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (!link) return;
    var href = link.getAttribute('href') || '';
    if (href === './about' || href === '/about' || href.endsWith('/about')) {
      e.preventDefault();
      e.stopImmediatePropagation();
      // Trigger curtain cover, then navigate
      var curtain = document.getElementById('page-curtain');
      if (curtain) {
        curtain.classList.add('curtain-cover');
        setTimeout(function() { window.location.href = './about.html'; }, 600);
      } else {
        window.location.href = './about.html';
      }
    }
  }, true);
</script>
