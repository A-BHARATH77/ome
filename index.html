  <!-- Custom Layout Overrides -->
  <style>
    /* ===== GRID-WORK SECTION ===== */

    /* Outer wrapper: full width, horizontal split */
    .grid-work {
      display: flex !important;
      flex-direction: row !important;
      align-items: flex-start !important;
      width: 100% !important;
      max-width: 100% !important;
      padding: 0 6% !important;
      box-sizing: border-box !important;
      min-height: 100vh !important;
      position: relative !important;
      background-color: #f7f2e6 !important;
      margin-top: -3rem !important;
    }

    /* Text colors for grid-work */
    .grid-work .top-text:not(.for-b),
    .grid-work .h2,
    .grid-work .small-ftd,
    .grid-work .work-title {
      color: #576E47 !important;
    }

    /* Progressive Reveal Animation */
    .reveal-wrapper {
      display: inline-block;
      overflow: hidden;
      vertical-align: top;
      padding-bottom: 0.15em;
      margin-bottom: -0.15em;
    }

    .reveal-text {
      display: inline-block;
      transform: translateY(110%);
      opacity: 0;
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease-out;
    }

    .reveal-text.in-view {
      transform: translateY(0);
      opacity: 1;
    }

    /* Hide Webflow badge */
    .w-webflow-badge {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    /* LEFT: sticky panel — vertically centered in viewport */
    .grid-work .sticky-lft {
      width: 28% !important;
      min-width: 220px !important;
      flex-shrink: 0 !important;
      position: sticky !important;
      top: 0 !important;
      height: 100vh !important;
      display: block !important;
      /* Use block to allow absolute positioning of children */
      z-index: 2 !important;
    }

    /* RIGHT: scrolling image column */
    .grid-work .work-main {
      flex: 1 1 0% !important;
      width: 0 !important;
      /* forces flex to control width */
      min-width: 0 !important;
      display: flex !important;
      flex-direction: column !important;
      padding-top: 5rem !important;
      padding-bottom: 5rem !important;
      padding-left: 5% !important;
      box-sizing: border-box !important;
    }

    /* Stack work cards vertically */
    .work-main .wrok-wrapper,
    .work-main .w-layout-grid {
      display: flex !important;
      flex-direction: column !important;
      gap: 3rem !important;
      width: 100% !important;
    }

    /* Each card fills the column */
    .work-card {
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 !important;
    }

    /* Image wrappers fill their card */
    .work-card .image-wrap,
    .work-card .image-wrap.full-width {
      width: 100% !important;
      max-width: 100% !important;
    }

    /* Images fill their wrappers */
    .work-card .paralax-image {
      width: 100% !important;
      max-width: 100% !important;
      height: auto !important;
      display: block !important;
      object-fit: cover !important;
    }

    /* work-main-wrapper fills its card */
    .work-card .work-main-wrapper {
      width: 100% !important;
      display: block !important;
    }

    /* collection wrappers fill width */
    .work-card .collection-list-wrapper,
    .work-card .collection-list-full,
    .work-card .collection-full {
      width: 100% !important;
    }

    /* Position the Work text at the top */
    .grid-work .sticky-lft>div:first-child {
      position: absolute !important;
      top: 12% !important;
      left: 0 !important;
      margin: 0 !important;
    }

    /* Position the dot near the middle */
    .grid-work .sticky-lft .circle-divider {
      position: absolute !important;
      top: 42% !important;
      left: 0 !important;
      margin: 0 !important;
    }

    /* Position the "View all work" button further down */
    .grid-work .sticky-lft>div:last-child,
    .grid-work .sticky-lft [data-w-id] {
      position: absolute !important;
      top: 68% !important;
      left: 0 !important;
      margin: 0 !important;
    }

    /* Keep the button wrapper 100% width in case there's a border */
    .grid-work .sticky-lft>div:last-child {
      width: 100% !important;
    }

    /* Mobile */
    @media (max-width: 991px) {
      .grid-work {
        flex-direction: column !important;
        padding: 2rem 5% !important;
        min-height: unset !important;
      }

      .grid-work .sticky-lft {
        width: 100% !important;
        min-width: unset !important;
        position: relative !important;
        height: auto !important;
        top: auto !important;
        margin-bottom: 2.5rem !important;
      }

      /* Reset text position for mobile */
      .grid-work .sticky-lft>div:first-child {
        position: relative !important;
        top: auto !important;
        margin-bottom: 1.5rem !important;
      }

      .grid-work .work-main {
        width: 100% !important;
        flex: unset !important;
        padding-left: 0 !important;
      }
    }

    // ── Text Scramble effect on nav links ─────────────────────────────────
    (function () {
      var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&';

      function scramble(el) {
        // If it's the nav-logo, we want to scramble the span inside it
        var targetEl = el.querySelector('.nav-logo-text') || el;
        
        var original = targetEl.dataset.original || targetEl.textContent.trim();
        targetEl.dataset.original = original;

        var frame = 0;
        var totalFrames = 18; // how many scramble frames before resolving
        var resolved = 0;
        var raf;

        function tick() {
          var output = '';
          for (var i = 0; i < original.length; i++) {
            if (original[i] === ' ') {
              output += ' ';
            } else if (i < resolved) {
              // this char has resolved back to original
              output += original[i];
            } else {
              // still scrambling
              output += chars[Math.floor(Math.random() * chars.length)];
            }
          }
          targetEl.textContent = output;
          frame++;
          // resolve one extra character every 6 frames (slower)
          if (frame % 6 === 0) resolved++;
          if (resolved < original.length) {
            raf = requestAnimationFrame(tick);
          } else {
            targetEl.textContent = original; // snap to final
          }
        }

        cancelAnimationFrame(raf);
        resolved = 0;
        frame = 0;
        tick();
      }

      // Use event delegation for both static and dynamic elements (including buttons)
      document.body.addEventListener('mouseenter', function (e) {
        var target = e.target;
        if (target.matches('.nav-link, .nav-logo, .framer-9318u0 a.framer-icduyd p, .framer-9318u0 a.framer-1svty61 p')) {
          scramble(target);
        }
      }, true);
    })();

  <script>

    (() => {
      const track = document.getElementById('heroMarqueeTrack');
      if (!track) return;

      const images = [
        'img1.jpg', 'img2.jpg', 'img3.jpg', 'img4.jpg', 'img5.jpg',
        'img6.jpg', 'img7.jpg', 'img8.jpg', 'img9.jpg', 'img10.jpg',

        'img16.jpg', 'img17.jpg', 'img19.jpg', 'img20.jpg', 'img21.jpg',
        'img22.jpg', 'img24.jpg', 'img25.jpg', 'img26.jpg', 'img27.jpg'
      ];

      // Create marquee items
      images.forEach(imgName => {
        const item = document.createElement('div');
        item.className = 'marquee-item';
        item.innerHTML = `<img src="./assets/images/hero%20section/${imgName}" alt="Hero Image" loading="lazy">`;
        track.appendChild(item);
      });

      // Clone items for infinite scroll
      const items = Array.from(track.children);
      items.forEach(item => {
        const clone = item.cloneNode(true);
        track.appendChild(clone);
      });

      // Animation
      let x = 0;
      const speed = 1.2;
      
      function animate() {
        x -= speed;
        const firstItem = track.children[0];
        if (!firstItem) return;
        
        const itemWidth = firstItem.offsetWidth + parseFloat(getComputedStyle(track).gap);
        
        if (Math.abs(x) >= itemWidth * images.length) {
          x = 0;
        }
        
        track.style.transform = `translateX(${x}px)`;
        requestAnimationFrame(animate);
      }
      
      requestAnimationFrame(animate);
    })();



  </script>

                  `<span class="reveal-wrapper"><span class="reveal-text" style="transition-delay: ${i * 0.15}s">${char}</span></span>`
                ).join('');

                const smallFtd = h2Title.querySelector('.small-ftd');
                const smallHtml = smallFtd ? `<span class="reveal-wrapper"><span class="reveal-text small-ftd" style="transition-delay: ${(word.length) * 0.15}s">${smallFtd.textContent}</span></span>` : '';

                h2Title.innerHTML = lettersHtml + smallHtml;

                const observer = new IntersectionObserver((entries) => {
                  entries.forEach(entry => {
                    if (entry.isIntersecting) {
                      entry.target.querySelectorAll('.reveal-text').forEach(el => el.classList.add('in-view'));
                    } else {
                      // Remove class when out of view so it animates again next time
                      entry.target.querySelectorAll('.reveal-text').forEach(el => el.classList.remove('in-view'));
                    }
                  });
                }, { threshold: 0.1 });
                observer.observe(h2Title);
              }

              // Restart Webflow so animations work on the new element
              if (window.Webflow) {
                window.Webflow.destroy();
                window.Webflow.ready();
                if (window.Webflow.require('ix2')) {
                  window.Webflow.require('ix2').init();
                }
              }
            }
          }
        }, 1500);
        // ------------------------


        // Re-execute scripts
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = window.pageBodyContent;
        tempDiv.querySelectorAll('script').forEach(oldScript => {
          const newScript = document.createElement('script');
          Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
          if (!oldScript.src) newScript.appendChild(document.createTextNode(oldScript.innerHTML));
          document.body.appendChild(newScript);
        });

        window.dispatchEvent(new Event('DOMContentLoaded'));
        window.dispatchEvent(new Event('load'));
      }
    })();
  </script>

  <!-- Hide our custom hero when Framer routes away from home -->
  <script>
    (function () {
      var hero = document.querySelector('section.hero');

      function isHome() {
        var p = window.location.pathname;
        // home = ends in / or /index.html or is just the file root
        return p === '/' || p.endsWith('/') || p.endsWith('/index.html') || p === '';
      }

      function applyVisibility() {
        var home = isHome();
        if (hero) hero.style.display = home ? '' : 'none';
      }

      // Patch pushState / replaceState so we catch Framer's router
      var _push = history.pushState;
      history.pushState = function () { _push.apply(this, arguments); applyVisibility(); };
      var _replace = history.replaceState;
      history.replaceState = function () { _replace.apply(this, arguments); applyVisibility(); };
      window.addEventListener('popstate', applyVisibility);

      // Run once on load in case we land on a non-home route
      applyVisibility();
    })();
  </script>
  <!-- Intercept Framer's ./about SPA link → hard-navigate -->
  <script>
    document.addEventListener('click', function (e) {
      var link = e.target.closest('a');
      if (!link) return;
      var href = link.getAttribute('href') || '';
      if (href === './about' || href === '/about' || href.endsWith('/about')) {
        e.preventDefault();
        e.stopImmediatePropagation();
        window.location.href = './about.html';
      }
    }, true);
  </script>
