<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>About — Slay The Strategy</title>
    <meta name="description" content="About Slay The Strategy — advanced thinking for advanced brands.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/pp-neue-montreal" rel="stylesheet">

    <!-- Shared navbar styles -->
    <link rel="stylesheet" href="./assets/css/navbar.css">

    <style>
        /* ── Reset & Page Tokens ──────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:        #f1efe7;
            --fg:        rgb(26, 26, 26);
            --fg-muted:  rgba(26, 26, 26, 0.6);
            --font-body: "PP Neue Montreal", sans-serif;
            --font-head: "Playfair Display", serif;
        }

        html { background-color: var(--bg); }

        body {
            font-family: var(--font-body);
            color: var(--fg);
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Page Content ─────────────────────────────────────────────── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6rem 2rem;
            text-align: center;
        }

        main h1 {
            font-family: var(--font-head);
            font-weight: 900;
            font-style: italic;
            font-size: clamp(3rem, 8vw, 6rem);
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 1.5rem;
        }

        main p {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            max-width: 620px;
            line-height: 1.6;
            color: var(--fg-muted);
        }
    </style>
</head>
<body>

    <!-- Shared navbar — loaded from navbar.html via navbar.js -->
    <div id="navbar-root"></div>

    <!-- About page content -->
    <main id="about-content">
        <h1>About Us</h1>
        <p>Ready for your content — just drop it in!</p>
    </main>

    <!-- Shared navbar loader -->
    <script src="./assets/js/navbar.js"></script>

</body>
</html>
