<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>About — Slay The Strategy</title>
    <meta name="description" content="About Slay The Strategy — advanced thinking for advanced brands.">

    <!-- Fonts: Switzer (matches Framer navbar) + Playfair Display (headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/pp-neue-montreal" rel="stylesheet">

    <style>
        /* ── Reset & Tokens ─────────────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:        #f1efe7;
            --fg:        rgb(26, 26, 26);
            --fg-muted:  rgba(26, 26, 26, 0.6);
            --nav-h:     70px;
            --nav-max-w: 1200px;
            --radius:    10px;
            --font-nav:  "Switzer", "Switzer Placeholder", sans-serif;
            --font-body: "PP Neue Montreal", sans-serif;
            --font-head: "Playfair Display", serif;
        }

        html { background-color: var(--bg); }

        body {
            font-family: var(--font-body);
            color: var(--fg);
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; }

        /* ── Navbar ─────────────────────────────────────────────────────── */
        /*
         * Mirrors the Framer navbar exactly:
         * - framer-yP8J4 / framer-w5skh2: outer nav, flex row, max-w 1200px, px 30px
         * - framer-52wxqa: inner container, space-between, min-h 70px
         * - framer-1mca7nk: right side menu group, flex row, gap 0
         * - nav items: min-w 120px, centered text, Switzer 500 -0.5px tracking
         * - "Let's Talk" button: pill shape with hover overlay
         */
        .site-nav {
            width: 100%;
            display: flex;
            flex-flow: row;
            place-content: center;
            align-items: center;
            gap: 10px;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 9999;
            background-color: var(--bg);
        }

        .nav-inner {
            width: 100%;
            max-width: var(--nav-max-w);
            min-height: var(--nav-h);
            display: flex;
            flex-flow: row;
            place-content: center space-between;
            align-items: center;
            overflow: clip;
        }

        /* Logo */
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-nav);
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            white-space: pre;
            color: var(--fg);
            flex: none;
        }

        /* Nav link group */
        .nav-menu {
            display: flex;
            flex-flow: row;
            align-items: center;
            gap: 0;
            flex: none;
        }

        .nav-link {
            min-width: 120px;
            display: flex;
            place-content: center;
            align-items: center;
            font-family: var(--font-nav);
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: var(--fg);
            white-space: pre;
            padding: 10px 0;
            position: relative;
            transition: opacity 0.2s ease;
        }

        .nav-link:hover { opacity: 0.7; }

        /* Active page indicator */
        .nav-link.active {
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        /* "Let's Talk" CTA button */
        .nav-cta {
            position: relative;
            display: flex;
            place-content: center;
            align-items: center;
            padding: 15px 24px;
            font-family: var(--font-nav);
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: rgba(26, 26, 26, 0.8);
            white-space: pre;
            border-radius: var(--radius);
            background-color: rgb(245, 245, 245);
            overflow: hidden;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .nav-cta::after {
            content: '';
            position: absolute;
            inset: 0;
            background-color: rgb(26, 26, 26);
            border-radius: 200%;
            transform: scale(0);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        border-radius 0.4s ease;
        }

        .nav-cta:hover { color: rgb(245, 245, 245); }
        .nav-cta:hover::after {
            transform: scale(2.5);
            border-radius: var(--radius);
        }

        .nav-cta span { position: relative; z-index: 1; }

        /* Mobile nav */
        @media (max-width: 809px) {
            .site-nav { padding: 0 15px; }
            .nav-link { min-width: 80px; font-size: 0.9rem; }
            .nav-cta { padding: 12px 16px; font-size: 0.9rem; }
        }

        /* ── Page Content ───────────────────────────────────────────────── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6rem 2rem;
            text-align: center;
        }

        main h1 {
            font-family: var(--font-head);
            font-weight: 900;
            font-style: italic;
            font-size: clamp(3rem, 8vw, 6rem);
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 1.5rem;
        }

        main p {
            font-family: var(--font-body);
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            max-width: 620px;
            line-height: 1.6;
            color: var(--fg-muted);
        }
    </style>
</head>
<body>

    <!-- ── Navbar ──────────────────────────────────────────────────────── -->
    <nav class="site-nav" aria-label="Main navigation">
        <div class="nav-inner">
            <!-- Logo -->
            <a class="nav-logo" href="./index.html" aria-label="Slay The Strategy — Home">
                Slay The Strategy
            </a>

            <!-- Links -->
            <div class="nav-menu" role="list">
                <a class="nav-link"        href="./index.html" role="listitem">Home</a>
                <a class="nav-link active" href="./about.html" role="listitem" aria-current="page">About</a>
                <a class="nav-link"        href="./work.html"  role="listitem">Work</a>
                <a class="nav-cta"         href="./contact.html">
                    <span>Let's Talk</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- ── About Content (drop your copy here) ────────────────────────── -->
    <main id="about-content">
        <h1>About Us</h1>
        <p>Ready for your content — just drop it in!</p>
    </main>

</body>
</html>
