            letter-spacing: -0.02em;

            max-width: 700px;
            margin: 0 auto;
            line-height: 1.5;
            opacity: 0.9;
        }
        
        /* Ensure navbar sits on top */
        nav { position: relative; z-index: 999; }
    </style>
